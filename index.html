        let currentSlide = 0
        
        function updateProgressBar() {
            const progress = ((currentSlide + 1) / slides.length) * 100
            document.getElementById('progress-bar').style.width = `${progress}%`
        }
        
        function updateSlideCounter() {
            const counter = document.getElementById('slide-counter')
            counter.textContent = `${currentSlide + 1} / ${slides.length}`
        }
        
        function updateCurrentTitle() {
            const titleEl = document.getElementById('current-slide-title')
            if (slides[currentSlide].id === 1) {
                titleEl.textContent = '표지'
            } else {
                titleEl.textContent = slides[currentSlide].title
            }
        }
        
        function showSlide(index) {
            if (index < 0 || index >= slides.length) return
            
            currentSlide = index
            const container = document.getElementById('slide-container')
            
            // Fade out
            container.style.opacity = '0'
            
            setTimeout(() => {
                container.innerHTML = slides[currentSlide].content
                container.style.opacity = '1'
                
                // Update UI
                updateSlideCounter()
                updateCurrentTitle()
                updateProgressBar()
                
                // Scroll to top of slide content
                container.scrollTop = 0
            }, 180)
        }
        
        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                showSlide(currentSlide + 1)
            }
        }
        
        function prevSlide() {
            if (currentSlide > 0) {
                showSlide(currentSlide - 1)
            }
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {})
            } else {
                document.exitFullscreen().catch(() => {})
            }
        }
        
        // Keyboard navigation
        function setupKeyboardControls() {
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowRight' || e.key === ' ') {
                    e.preventDefault()
                    nextSlide()
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault()
                    prevSlide()
                } else if (e.key.toLowerCase() === 'f') {
                    toggleFullscreen()
                } else if (e.key === 'Escape' && document.fullscreenElement) {
                    document.exitFullscreen()
                }
            })
            
            // Touch swipe support (basic)
            let touchStartX = 0
            const slideContainer = document.getElementById('slide-container')
            
            slideContainer.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX
            })
            
            slideContainer.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].screenX
                const diff = touchStartX - touchEndX
                
                if (Math.abs(diff) > 60) {
                    if (diff > 0) {
                        nextSlide()
                    } else {
                        prevSlide()
                    }
                }
            })
        }
        
        // Initialize everything
        function initializePresentation() {
            initializeTailwind()
            
            // Show first slide
            const container = document.getElementById('slide-container')
            container.innerHTML = slides[0].content
            container.style.transition = 'opacity 0.18s ease'
            
            updateSlideCounter()
            updateCurrentTitle()
            updateProgressBar()
            
            setupKeyboardControls()
            
            // Optional: Auto-focus for better keyboard experience
            setTimeout(() => {
                container.setAttribute('tabindex', '0')
            }, 500)
            
            // Easter egg: Press "?" to show all slide titles in console (for presenter)
            document.addEventListener('keypress', function(e) {
                if (e.key === '?') {
                    console.log('%c[발표자 도움] 전체 슬라이드 목록:', 'color:#14b8a6')
                    slides.forEach((s, i) => {
                        console.log(`${i+1}. ${s.title}`)
                    })
                }
            })
            
            // Initial tip in console
            console.log('%c[발표 자료] 키보드 조작: ← → 화살표 또는 스페이스바로 슬라이드 이동 | F 키로 전체화면', 'color:#3f3f46')
        }
        
        // Boot the presentation
        window.onload = initializePresentation
    </script>
